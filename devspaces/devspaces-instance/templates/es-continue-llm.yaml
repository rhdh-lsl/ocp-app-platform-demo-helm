apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: claude-config
  namespace: {{ include "devspaces-instance.namespace" . }}
  annotations:
    {{- include "devspaces-instance.argocd-syncwave" . | nindent 4 }}
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault-secret-store
    kind: ClusterSecretStore
  target:
    name: claude-config
    creationPolicy: Owner
    template:
      metadata:
        labels:
          app.kubernetes.io/part-of: che.eclipse.org
          app.kubernetes.io/component: workspaces-config
        annotations:
          controller.devfile.io/mount-as: subpath
          controller.devfile.io/mount-path: /home/user/.claude-config
      data:
        # The approved key is the API key with the first 5 characters stripped
        # (e.g. "sk-v0abc123" becomes "abc123"). This pre-approves the key so
        # Claude Code doesn't prompt the user to trust it on first run.
        .claude.json: |
          {
            "numStartups": 4,
            "installMethod": "native",
            "autoUpdates": false,
            "customApiKeyResponses": {
              "approved": [
                {{ printf "\"{{ substr 5 -1 .api_key }}\"" }}
              ],
              "rejected": []
            },
            "firstStartTime": "2026-04-15T22:31:52.004Z",
            "opusProMigrationComplete": true,
            "sonnet1m45MigrationComplete": true,
            "migrationVersion": 11,
            "userID": "",
            "shiftEnterKeyBindingInstalled": true,
            "hasCompletedOnboarding": true,
            "lastOnboardingVersion": "2.1.110",
            "projects": {},
            "effortCalloutV2Dismissed": true,
            "lastReleaseNotesSeen": "2.1.110",
            "officialMarketplaceAutoInstallAttempted": true,
            "officialMarketplaceAutoInstalled": true,
            "autoUpdatesProtectedForNative": true,
            "mcpServers": {
              "rhdh-mcp": {
                "type": "http",
                "url": "http://backstage-developer-hub.rhdh.svc.cluster.local/api/mcp-actions/v1",
                "headers": {
                  "Authorization": {{ printf "\"Bearer {{ .mcp_secret }}\"" }}
                }
              }
            }
          }
  data:
    - secretKey: api_key
      remoteRef:
        key: secrets/litellm/credentials
        property: api_key
    - secretKey: mcp_secret
      remoteRef:
        key: secrets/rhdh/mcp-secret
        property: value
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: workspace-env-credentials
  namespace: {{ include "devspaces-instance.namespace" . }}
  annotations:
    {{- include "devspaces-instance.argocd-syncwave" . | nindent 4 }}
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault-secret-store
    kind: ClusterSecretStore
  target:
    name: workspace-env-credentials
    creationPolicy: Owner
    template:
      metadata:
        labels:
          app.kubernetes.io/part-of: che.eclipse.org
          app.kubernetes.io/component: workspaces-config
        annotations:
          controller.devfile.io/mount-as: env
      data:
        LLM_API_KEY: "{{ printf "{{ .api_key }}" }}"
        LLM_BASE_URL: "{{ printf "{{ .base_url }}" }}"
        # Required by the Claude Code VS Code extension to connect to a
        # vLLM-hosted model via the Anthropic-compatible API.
        # See: https://docs.vllm.ai/en/stable/serving/integrations/claude_code/
        ANTHROPIC_BASE_URL: {{ printf "\"{{ .base_url | trimSuffix `/v1` }}\"" }}
        ANTHROPIC_API_KEY: "{{ printf "{{ .api_key }}" }}"
        ANTHROPIC_MODEL: "claude-opus-4-6"
        DEV_KAFKA_PASSWORD: "{{ printf "{{ .kafka_password }}" }}"
  data:
    - secretKey: api_key
      remoteRef:
        key: secrets/litellm/credentials
        property: api_key
    - secretKey: base_url
      remoteRef:
        key: secrets/litellm/credentials
        property: base_url
    - secretKey: kafka_password
      remoteRef:
        key: secrets/kafka/user-password
        property: value
