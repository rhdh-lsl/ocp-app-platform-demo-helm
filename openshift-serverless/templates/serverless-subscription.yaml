---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: serverless-operator
  namespace: openshift-serverless
spec:
  channel: {{ .Values.serverless.channel }}
  installPlanApproval: {{ .Values.serverless.installPlanApproval }}
  name: {{ .Values.serverless.name }}
  source: {{ .Values.serverless.source }}
  sourceNamespace: {{ .Values.serverless.sourceNamespace }}
