---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: logic-operator
  namespace: openshift-serverless-logic
spec:
  channel: {{ .Values.serverlessLogic.channel }}
  installPlanApproval: {{ .Values.serverlessLogic.installPlanApproval }}
  name: {{ .Values.serverlessLogic.name }}
  source: {{ .Values.serverlessLogic.source }}
  sourceNamespace: {{ .Values.serverlessLogic.sourceNamespace }}
