catalogSources:
  - name: redhat-operators-snapshot
    image: quay.io/gpte-devops-automation/olm_snapshot_redhat_catalog
    tag: v4.20_2026_02_11
    namespace: openshift-marketplace
    displayName: "Red Hat Operators (Snapshot)"
    publisher: "Red Hat Demo Platform"
    # The default memory request (50Mi) is too low for large catalog images
    # (~1.6GB). The pod OOM-thrashes and can't respond to startup probes.
    # Setting memoryTarget gives the server enough headroom to load the catalog.
    grpcPodConfig:
      memoryTarget: 256Mi
