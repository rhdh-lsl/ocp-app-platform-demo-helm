{{- range .Values.catalogSources }}
---
apiVersion: operators.coreos.com/v1alpha1
kind: CatalogSource
metadata:
  name: {{ .name }}
  namespace: {{ .namespace }}
spec:
  sourceType: grpc
  image: {{ .image }}:{{ .tag }}
  displayName: {{ .displayName | quote }}
  publisher: {{ .publisher | quote }}
  {{- /* Override gRPC pod config (e.g. memoryTarget) for large catalog images */}}
  {{- with .grpcPodConfig }}
  grpcPodConfig:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
