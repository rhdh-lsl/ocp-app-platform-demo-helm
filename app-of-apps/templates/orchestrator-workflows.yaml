apiVersion: argoproj.io/v1alpha1
kind: Application
{{ include "app-of-apps.metadata" (dict "name" .Values.orchestratorWorkflows.name "namespace" .Values.argocd.namespace "syncWave" "4") }}
spec:
  destination:
    namespace: {{ .Values.orchestratorWorkflows.namespace }}
    server: https://kubernetes.default.svc
  project: default
  source:
    path: orchestrator-workflows/create-ocp-namespace-swt
    repoURL: {{ .Values.gitops.repoURL }}
    targetRevision: {{ .Values.gitops.targetRevision }}
    helm:
      valuesObject:
        cluster:
          subdomain: {{ .Values.cluster.subdomain }}
{{ include "app-of-apps.syncPolicy" . | indent 2 }}
