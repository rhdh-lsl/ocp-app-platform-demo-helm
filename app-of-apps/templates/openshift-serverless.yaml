apiVersion: argoproj.io/v1alpha1
kind: Application
{{ include "app-of-apps.metadata" (dict "name" .Values.openshiftServerless.name "namespace" .Values.argocd.namespace "syncWave" "0") }}
spec:
  destination:
    namespace: {{ .Values.openshiftServerless.namespace }}
    server: https://kubernetes.default.svc
  project: default
  source:
    path: openshift-serverless
    repoURL: {{ .Values.gitops.repoURL }}
    targetRevision: {{ .Values.gitops.targetRevision }}
    helm:
      valuesObject:
        serverless:
          source: {{ include "app-of-apps.operatorSource" . }}
        serverlessLogic:
          source: {{ include "app-of-apps.operatorSource" . }}
{{ include "app-of-apps.syncPolicy" . | indent 2 }}
